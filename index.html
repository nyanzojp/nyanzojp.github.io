<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYANZO - Artist Profile</title>
    <style>
        /* ページ全体の背景とフォント設定 */
        body {
            margin: 0;
            padding: 20px 0;
            background-color: #fcfcfc;
            display: flex;
            justify-content: center;
            /* 筑紫ゴシック（アキコンのこだわり） */
            font-family: "TsukuGothicPro-Regular", "筑紫ゴシック", "TsukuARoundGothic-Regular", sans-serif;
        }

        /* 343pxフルサイズ表のコンテナ・角丸なし */
        .profile-full-container {
            width: 343px; 
            border-top: 0.5px solid #f7cfe6;
            border-bottom: 0.5px solid #f7cfe6;
            background-color: #FFF5FA;
        }

        .lab8-table-full {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .lab8-table-full tr {
            border-bottom: 0.5px solid #f7cfe6;
        }

        /* 1列目：項目（幅95px） */
        .lab8-table-full th {
            width: 95px; 
            background-color: #F0A0CD;
            color: #28324B;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 12px;
            text-align: left;
            vertical-align: middle;
            box-sizing: border-box;
        }

        /* 2列目：内容（幅248px） */
        .lab8-table-full td {
            width: 248px;
            color: #28324B;
            font-size: 14px;
            padding: 10px 15px;
            vertical-align: middle;
            background-color: #FFF5FA;
            word-break: break-all;
            line-height: 1.5;
        }

        /* 受賞・他の活動用の高め設定 */
        .row-high th, .row-high td {
            padding: 20px 12px !important;
        }

        /* リンク設定 */
        .profile-link-full {
            color: #F0A0CD !important;
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="profile-full-container">
        <table class="lab8-table-full">
            <tbody>
                <tr><th>名前</th><td>ラブ♡丸（読み：ラブまる）</td></tr>
                <tr><th>本名</th><td>同一</td></tr>
                <tr><th>入居時期</th><td>2008, 2009年（推定）</td></tr>
                <tr><th>趣味</th><td>お金儲け / 大会の主催</td></tr>
                <tr><th>特技</th><td>大声で叫ぶ</td></tr>
                <tr class="row-high"><th>受賞</th><td><span style="color: #6E8296;">未記述</span></td></tr>
                <tr class="row-high"><th>他の活動</th>
                    <td><a href="https://nyanzo.wixsite.com/japan/artist/sapporosourpapers" target="_blank" class="profile-link-full">サッポロサワーペーパーズ</a></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
